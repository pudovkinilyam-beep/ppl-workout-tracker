<script>
  // Локальное хранилище вместо Claude window.storage — работает офлайн в браузере
  window.storage = {
    async get(key, shared) {
      const v = localStorage.getItem(key);
      if (v === null) return null;
      return { key, value: v, shared: !!shared };
    },
    async set(key, value, shared) {
      localStorage.setItem(key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared) {
      localStorage.removeItem(key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared) {
      const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: !!shared };
    }
  };
</script>

const DAY_META = {
  push: { label: "PUSH", sub: "Грудь · Плечи · Трицепс", code: "01" },
  pull: { label: "PULL", sub: "Спина · Бицепс · Зад. дельты", code: "02" },
  legs: { label: "LEGS", sub: "Ноги · Ягодицы · Кор", code: "03" },
};

const TARGET_RU = {
  pectorals: "грудь", delts: "дельты", triceps: "трицепс", lats: "широчайшие",
  "upper back": "верх спины", biceps: "бицепс", glutes: "ягодицы", quads: "квадрицепс",
  hamstrings: "бицепс бедра", calves: "икры", abs: "пресс",
};

const todayKey = () => new Date().toISOString().slice(0, 10);

/* id -> {...exercise, dayType} для быстрого поиска при построении истории */
const EX_INDEX = {};
Object.keys(PROGRAM).forEach((d) => {
  PROGRAM[d].forEach((ex) => { EX_INDEX[ex.id] = { ...ex, dayType: d }; });
});

const RU_MONTHS = ["янв", "фев", "мар", "апр", "мая", "июн", "июл", "авг", "сен", "окт", "ноя", "дек"];
const RU_WEEKDAYS = ["вс", "пн", "вт", "ср", "чт", "пт", "сб"];

function fmtDateRu(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return `${RU_WEEKDAYS[d.getDay()]}, ${d.getDate()} ${RU_MONTHS[d.getMonth()]}`;
}

/* понедельник недели, содержащей dateStr, в виде YYYY-MM-DD (ключ недели) */
function weekKey(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const dow = (d.getDay() + 6) % 7; // 0 = понедельник
  d.setDate(d.getDate() - dow);
  return d.toISOString().slice(0, 10);
}

function fmtClock(s) {
  const m = Math.floor(s / 60).toString().padStart(2, "0");
  const r = Math.floor(s % 60).toString().padStart(2, "0");
  return `${m}:${r}`;
}

function youtubeSearchUrl(nameEn) {
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(nameEn + " exercise tutorial form")}`;
}

/* ====================== STORAGE HELPERS ====================== */
async function loadLog(exId) {
  try {
    const res = await window.storage.get(`log:${exId}`, false);
    return res ? JSON.parse(res.value) : null;
  } catch {
    return null;
  }
}
async function saveLog(exId, data) {
  try {
    await window.storage.set(`log:${exId}`, JSON.stringify(data), false);
  } catch (e) {
    console.error("storage set failed", e);
  }
}

/* ====================== ФОТО С FALLBACK ====================== */
function ExPhoto({ src, alt, className }) {
  const [failed, setFailed] = React.useState(false);
  if (failed || !src) {
    return (
      <div className={`${className} photo-fallback`}>
        <svg viewBox="0 0 24 24" width="40%" height="40%">
          <circle cx="12" cy="8" r="3.2" fill="none" stroke="currentColor" strokeWidth="1.4" />
          <path d="M5 20c0-4 3-6.5 7-6.5s7 2.5 7 6.5" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" />
        </svg>
      </div>
    );
  }
  return <img src={src} alt={alt} className={className} loading="lazy" onError={() => setFailed(true)} />;
}

/* ====================== EXERCISE CARD ====================== */
function ExerciseCard({ ex, index }) {
  const numSets = parseInt(ex.sets, 10);
  const [rows, setRows] = React.useState(
    Array.from({ length: numSets }, () => ({ weight: "", reps: "", done: false }))
  );
  const [lastSession, setLastSession] = React.useState(null);
  const [open, setOpen] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [timer, setTimer] = React.useState(null);
  const [photoPhase, setPhotoPhase] = React.useState(0);
  const [lightbox, setLightbox] = React.useState(false);
  const intervalRef = React.useRef(null);

  React.useEffect(() => {
    let mounted = true;
    (async () => {
      const log = await loadLog(ex.id);
      if (mounted && log) {
        setLastSession(log.history && log.history.length ? log.history[log.history.length - 1] : null);
        if (log.date === todayKey() && log.rows) {
          setRows(log.rows);
          setSaved(true);
        }
      }
    })();
    return () => { mounted = false; };
  }, [ex.id]);

  React.useEffect(() => {
    if (timer === null || timer <= 0) return;
    intervalRef.current = setInterval(() => {
      setTimer((t) => (t === null || t <= 1 ? 0 : t - 1));
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [timer]);

  const updateRow = (i, field, val) => {
    setRows((prev) => {
      const next = [...prev];
      next[i] = { ...next[i], [field]: val };
      return next;
    });
    setSaved(false);
  };

  const toggleDone = (i) => updateRow(i, "done", !rows[i].done);

  const handleSave = async () => {
    const existing = await loadLog(ex.id);
    const history = existing && Array.isArray(existing.history) ? existing.history.filter(h => h.date !== todayKey()) : [];
    const completed = rows.filter(r => r.weight !== "" || r.reps !== "");
    if (completed.length) history.push({ date: todayKey(), rows: completed });
    const trimmed = history.slice(-60);
    await saveLog(ex.id, { date: todayKey(), rows, history: trimmed });
    setLastSession(trimmed.length ? trimmed[trimmed.length - 1] : null);
    setSaved(true);
  };

  const doneCount = rows.filter(r => r.done).length;
  const allDone = doneCount === numSets;
  const photos = ex.images || [];

  return (
    <div className={`ex-card ${allDone ? "ex-card--done" : ""}`}>
      <div className="ex-head" onClick={() => setOpen(!open)}>
        <ExPhoto src={photos[0]} alt={ex.nameEn} className="ex-thumb" />
        <div className="ex-headtext">
          <div className="ex-name">{ex.name}</div>
          <div className="ex-meta">
            <span className="ex-target">{TARGET_RU[ex.target] || ex.target}</span>
            <span className="dot">·</span>
            <span>{ex.sets}×{ex.reps}</span>
            <span className="dot">·</span>
            <span>отдых {ex.rest}с</span>
          </div>
        </div>
        <div className="ex-progress">{doneCount}/{numSets}</div>
        <div className={`chev ${open ? "chev--open" : ""}`}>▾</div>
      </div>

      {open && (
        <div className="ex-body">
          <div className="ex-photo-block">
            <div className="ex-photo-big" onClick={() => setLightbox(true)}>
              <ExPhoto src={photos[photoPhase]} alt={ex.nameEn} className="ex-photo-img" />
              <div className="ex-photo-zoom">⤢</div>
            </div>
            {photos.length > 1 && (
              <div className="photo-toggle">
                {photos.map((_, i) => (
                  <button
                    key={i}
                    className={`phase-btn ${photoPhase === i ? "phase-btn--on" : ""}`}
                    onClick={() => setPhotoPhase(i)}
                  >
                    {i === 0 ? "Старт" : "Финал"}
                  </button>
                ))}
              </div>
            )}
            <a className="video-link" href={youtubeSearchUrl(ex.nameEn)} target="_blank" rel="noopener noreferrer">
              ▶ Видео техники на YouTube
            </a>
          </div>

          <div className="rec-weight">
            <span className="rec-label">Стартовый вес</span>
            <span className="rec-value">
              {ex.recMin === 0 && ex.recMax === 0 ? "вес тела" : `${ex.recMin}–${ex.recMax} кг`}
            </span>
            <span className="rec-note">{ex.recNote}</span>
          </div>

          <p className="ex-instr">{ex.instructions}</p>

          {lastSession && (
            <div className="ex-last">
              Прошлый раз ({lastSession.date.slice(5)}):{" "}
              {lastSession.rows.map((r, i) => (
                <span key={i} className="last-chip">{r.weight || "—"}кг×{r.reps || "—"}</span>
              ))}
            </div>
          )}

          <div className="set-table">
            <div className="set-row set-row--header">
              <span>Подход</span><span>Вес, кг</span><span>Повторы</span><span></span>
            </div>
            {rows.map((row, i) => (
              <div className="set-row" key={i}>
                <span className="set-idx">{i + 1}</span>
                <input
                  type="number" inputMode="decimal"
                  placeholder={lastSession?.rows?.[i]?.weight || (ex.recMax ? `~${Math.round((ex.recMin + ex.recMax) / 2)}` : "—")}
                  value={row.weight}
                  onChange={(e) => updateRow(i, "weight", e.target.value)}
                />
                <input
                  type="number" inputMode="numeric"
                  placeholder={lastSession?.rows?.[i]?.reps || ex.reps.split("-")[0]}
                  value={row.reps}
                  onChange={(e) => updateRow(i, "reps", e.target.value)}
                />
                <button className={`check ${row.done ? "check--on" : ""}`} onClick={() => toggleDone(i)} aria-label="Подход выполнен">
                  {row.done ? "✓" : ""}
                </button>
              </div>
            ))}
          </div>

          <div className="ex-actions">
            <button className="btn-rest" onClick={() => setTimer(ex.rest)}>
              {timer !== null && timer > 0 ? `⏱ ${fmtClock(timer)}` : `⏱ Таймер отдыха ${ex.rest}с`}
            </button>
            <button className="btn-save" onClick={handleSave}>
              {saved ? "Сохранено" : "Сохранить подходы"}
            </button>
          </div>
        </div>
      )}

      {lightbox && (
        <div className="lightbox" onClick={() => setLightbox(false)}>
          <ExPhoto src={photos[photoPhase]} alt={ex.nameEn} className="lightbox-img" />
        </div>
      )}
    </div>
  );
}

const DAY_ACCENT = { push: "var(--rust)", pull: "var(--olive)", legs: "#c99a4a" };

function SessionCard({ date, dayType, entries, plannedTotal }) {
  const [open, setOpen] = React.useState(false);
  const totalSets = entries.reduce((s, e) => s + e.rows.length, 0);
  const volume = entries.reduce(
    (s, e) => s + e.rows.reduce((s2, r) => s2 + (parseFloat(r.weight) || 0) * (parseFloat(r.reps) || 0), 0),
    0
  );
  const meta = DAY_META[dayType];

  return (
    <div className="sess-card">
      <div className="sess-head" onClick={() => setOpen(!open)}>
        <div className="sess-daydot" style={{ background: DAY_ACCENT[dayType] || "var(--chalk-dim)" }} />
        <div className="sess-headtext">
          <div className="sess-date">{fmtDateRu(date)}</div>
          <div className="sess-sub">
            {meta ? meta.label : "Тренировка"} · {entries.length} упр. · {totalSets}/{plannedTotal} сетов
            {volume > 0 ? ` · ${Math.round(volume)} кг объём` : ""}
          </div>
        </div>
        <div className={`chev ${open ? "chev--open" : ""}`}>▾</div>
      </div>
      {open && (
        <div className="sess-body">
          {entries.map((e) => (
            <div className="sess-ex" key={e.exId}>
              <div className="sess-ex-name">
                {e.name}
                {e.delta !== null && (
                  <span className={`delta ${e.delta > 0 ? "delta--up" : e.delta < 0 ? "delta--down" : "delta--flat"}`}>
                    {e.delta > 0 ? `▲ +${e.delta}кг` : e.delta < 0 ? `▼ ${e.delta}кг` : "= вес"}
                  </span>
                )}
              </div>
              <div className="sess-ex-sets">
                {e.rows.map((r, i) => (
                  <span key={i} className="last-chip">{r.weight || "—"}кг×{r.reps || "—"}</span>
                ))}
                <span className="sess-ex-frac">{e.rows.length}/{e.plannedSets}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function WeekChart({ buckets }) {
  const max = Math.max(3, ...buckets.map((b) => b.count));
  return (
    <div className="week-chart">
      {buckets.map((b, i) => (
        <div className="week-bar-col" key={i}>
          <div className="week-bar-track">
            <div className="week-bar-fill" style={{ height: `${(b.count / max) * 100}%` }} />
          </div>
          <div className="week-bar-count">{b.count}</div>
          <div className="week-bar-label">{b.label}</div>
        </div>
      ))}
    </div>
  );
}

  const [sessions, setSessions] = React.useState([]);
  const [stats, setStats] = React.useState({ total: 0, thisWeek: 0, buckets: [] });

  React.useEffect(() => {
    let mounted = true;
    (async () => {
      const ids = Object.keys(EX_INDEX);
      const logs = await Promise.all(ids.map((id) => loadLog(id)));

      // плоский список всех сохранённых сетов по всем упражнениям
      const flat = [];
      ids.forEach((id, i) => {
        const log = logs[i];
        if (!log || !Array.isArray(log.history)) return;
        log.history.forEach((h) => {
          if (h.rows && h.rows.length) flat.push({ exId: id, date: h.date, rows: h.rows });
        });
      });

      // дельта веса относительно предыдущей сессии этого же упражнения
      const byEx = {};
      flat.forEach((r) => { (byEx[r.exId] = byEx[r.exId] || []).push(r); });
      Object.values(byEx).forEach((arr) => {
        arr.sort((a, b) => (a.date < b.date ? -1 : 1));
        arr.forEach((r, i) => {
          const avg = (rows) => {
            const vals = rows.map((x) => parseFloat(x.weight)).filter((v) => !isNaN(v));
            return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
          };
          const cur = avg(r.rows);
          const prev = i > 0 ? avg(arr[i - 1].rows) : null;
          r.delta = cur !== null && prev !== null ? Math.round((cur - prev) * 10) / 10 : null;
        });
      });

      // группировка по дате
      const byDate = {};
      flat.forEach((r) => {
        const meta = EX_INDEX[r.exId];
        (byDate[r.date] = byDate[r.date] || []).push({
          exId: r.exId, name: meta.name, dayType: meta.dayType,
          plannedSets: parseInt(meta.sets, 10), rows: r.rows, delta: r.delta ?? null,
        });
      });

      const dates = Object.keys(byDate).sort((a, b) => (a < b ? 1 : -1));
      const sessionsBuilt = dates.map((date) => {
        const entries = byDate[date];
        const counts = {};
        entries.forEach((e) => { counts[e.dayType] = (counts[e.dayType] || 0) + 1; });
        const dayType = Object.keys(counts).sort((a, b) => counts[b] - counts[a])[0];
        const plannedTotal = entries.reduce((s, e) => s + e.plannedSets, 0);
        return { date, dayType, entries, plannedTotal };
      });

      // недельный график: последние 8 недель, считаем уникальные тренировочные дни
      const today = new Date();
      const wBuckets = [];
      for (let i = 7; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i * 7);
        const wk = weekKey(d.toISOString().slice(0, 10));
        const count = dates.filter((dt) => weekKey(dt) === wk).length;
        wBuckets.push({ label: `${new Date(wk).getDate()}.${new Date(wk).getMonth() + 1}`, count, wk });
      }
      const thisWeek = dates.filter((dt) => weekKey(dt) === weekKey(todayKey())).length;

      if (mounted) {
        setSessions(sessionsBuilt);
        setStats({ total: dates.length, thisWeek, buckets: wBuckets });
        setLoading(false);
      }
    })();
    return () => { mounted = false; };
  }, []);

  if (loading) return <div className="hist-empty">Загружаю историю…</div>;

  if (!sessions.length) {
    return (
      <div className="hist-empty">
        Пока нет сохранённых тренировок.<br />
        Заполни подходы на вкладке «Тренировка» и нажми «Сохранить подходы» — здесь появится прогресс по дням.
      </div>
    );
  }

  return (
    <div className="hist">
      <div className="hist-stats">
        <div className="stat-card">
          <div className="stat-value">{stats.total}</div>
          <div className="stat-label">тренировок всего</div>
        </div>
        <div className="stat-card">
          <div className="stat-value">{stats.thisWeek}/3</div>
          <div className="stat-label">на этой неделе</div>
        </div>
      </div>

      <div className="hist-block-title">По неделям</div>
      <WeekChart buckets={stats.buckets} />

      <div className="hist-block-title">Все тренировки</div>
      <div className="sess-list">
        {sessions.map((s) => (
          <SessionCard key={s.date} date={s.date} dayType={s.dayType} entries={s.entries} plannedTotal={s.plannedTotal} />
        ))}
      </div>
    </div>
  );
}
